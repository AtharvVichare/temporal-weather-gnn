
experiment:
  name: "temporal_weather_gnn"
  seed: 42
  debug: false         
  
data:
  dataset: "synthetic" 
  data_dir: "data/raw"
  cache_dir: "data/processed"
  graph_dir: "graphs"

  variables: ["temperature", "u_wind", "v_wind", "pressure", "humidity"]
  n_stations: 100        
  history_len: 12        
  forecast_len: 6        
  dt_hours: 1          

  train_frac: 0.70
  val_frac:   0.15
  test_frac:  0.15

  normalize: true
  norm_method: "z-score" 

  batch_size: 8
  num_workers: 4
  pin_memory: true

graph:
  static_k: 8             
  static_max_dist_km: 500    

  dynamic_method: "learned"  
  dynamic_top_k: 6          
  dynamic_update_freq: 1     

  ripple_radius: 3
  ripple_threshold: 0.1    
  ripple_steps: 4            
  
model:
  variant: "fusion"   

  node_feat_dim: 5   
  hidden_dim: 128
  edge_feat_dim: 16
  n_heads: 4       

  encoder_layers: 3
  encoder_dropout: 0.1

  temporal_encoding: "sinusoidal"  
  max_seq_len: 168                

  processor_layers: 6

  decoder_layers: 2

  fusion_method: "gated"   

  autoregressive: true

training:
  epochs: 50
  lr: 3.0e-4
  weight_decay: 1.0e-5
  scheduler: "cosine"       
  warmup_epochs: 5
  gradient_clip: 1.0

  loss: "mse"               
  physics_loss_weight: 0.0  
  rollout_loss_weight: 1.0  

  ckpt_dir: "checkpoints"
  save_top_k: 3
  monitor_metric: "val/rmse_temperature"

logging:
  backend: "tensorboard"   
  log_every_n_steps: 10
  wandb_project: "temporal-weather-gnn"
  wandb_entity: null      

evaluation:
  lead_times: [1, 3, 6, 12, 24]   
  metrics: ["rmse", "mae", "bias", "acc", "skill_persistence"]
  climatology_window: 30           
  output_dir: "results"
